name: Deploy

on:
  push:
    branches:
      - main
      - "claude/**"
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "cursor/**"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-build-artifacts:
    name: Verify deploy artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/search_engine/requirements.txt
          pip install -r src/backend/requirements.txt

      - name: Verify backend imports
        env:
          PYTHONPATH: src
        run: python -c "from backend import main; from search_engine import search, cache, db; print('Backend imports OK')"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Build frontend
        run: |
          npm ci --prefix src/frontend
          npm run build --prefix src/frontend

  deploy-backend:
    name: Deploy backend (Railway)
    runs-on: ubuntu-latest
    needs: verify-build-artifacts
    steps:
      - name: Trigger Railway deploy hook
        env:
          RAILWAY_DEPLOY_HOOK_PRODUCTION_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_PRODUCTION_URL }}
          RAILWAY_DEPLOY_HOOK_PREVIEW_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_PREVIEW_URL }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            if [ -z "${RAILWAY_DEPLOY_HOOK_PRODUCTION_URL}" ]; then
              echo "Skipping backend deploy: RAILWAY_DEPLOY_HOOK_PRODUCTION_URL is not set."
              exit 0
            fi
            curl -fsSL -X POST "${RAILWAY_DEPLOY_HOOK_PRODUCTION_URL}"
            echo "Triggered Railway production deploy."
            exit 0
          fi

          if [ -z "${RAILWAY_DEPLOY_HOOK_PREVIEW_URL}" ]; then
            echo "Skipping backend deploy: RAILWAY_DEPLOY_HOOK_PREVIEW_URL is not set."
            exit 0
          fi
          curl -fsSL -X POST "${RAILWAY_DEPLOY_HOOK_PREVIEW_URL}"
          echo "Triggered Railway preview deploy."

  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    needs: verify-build-artifacts
    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_PRODUCTION_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_PRODUCTION_URL }}
          VERCEL_DEPLOY_HOOK_PREVIEW_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_PREVIEW_URL }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            if [ -z "${VERCEL_DEPLOY_HOOK_PRODUCTION_URL}" ]; then
              echo "Skipping frontend deploy: VERCEL_DEPLOY_HOOK_PRODUCTION_URL is not set."
              exit 0
            fi
            curl -fsSL -X POST "${VERCEL_DEPLOY_HOOK_PRODUCTION_URL}"
            echo "Triggered Vercel production deploy."
            exit 0
          fi

          if [ -z "${VERCEL_DEPLOY_HOOK_PREVIEW_URL}" ]; then
            echo "Skipping frontend deploy: VERCEL_DEPLOY_HOOK_PREVIEW_URL is not set."
            exit 0
          fi
          curl -fsSL -X POST "${VERCEL_DEPLOY_HOOK_PREVIEW_URL}"
          echo "Triggered Vercel preview deploy."
